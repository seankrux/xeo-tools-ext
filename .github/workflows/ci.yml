name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest
        run: |
          if [ -f manifest.json ]; then
            python3 -m json.tool manifest.json > /dev/null
          elif [ -f sean-seo-checker-v2.1/manifest.json ]; then
            echo "Manifest found in sean-seo-checker-v2.1/"
            python3 -m json.tool sean-seo-checker-v2.1/manifest.json > /dev/null
          else
            echo "No manifest.json found" && exit 1
          fi
